<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet"><link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Product preview card component</title>

</head>
<body>

  <main class="product-card">

      <picture>
        <source media="(min-width: 48rem)" srcset="./images/image-product-desktop.jpg">
        <img src="./images/image-product-mobile.jpg" alt="Perfume bottle">
      </picture>

      <section class="product-info">
        <span class="product-category text-preset-4">Perfume</span>

        <h1 class="text-preset-1">Gabrielle Essence Eau De Parfum</h1>

        <p class="product-description text-preset-3">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.</p>

        <div class="pricing">
        <p class="text-preset-1">$149.99</p>
        <p class="text-preset-5">$169.99</p>
        </div>

        <button type="button" class="text-preset-2">
          <img src="images/icon-cart.svg" alt="" aria-hidden="true" />
          <span class="visually-hidden">Add to cart</span>
          Add to cart
        </button>

      </section>

  </main>
  
  <footer class="attribution">
      <p>Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="https://github.com/joparke">JP.</a></p>
  </footer>

</body>
</html>
